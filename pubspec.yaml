name: lea
description: Лея — приватный трекер менструального цикла. Без рекламы, без слежки, офлайн.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  flutter_timezone: ^5.1.0
  # дизайн-система (локальный модуль)
  lea_design:
    path: ../lea_design

  # состояние
  flutter_riverpod: ^2.5.1

  # БД + шифрование
  drift: ^2.18.0
  sqlcipher_flutter_libs: ^0.6.0
  sqlite3: ^2.4.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # секреты (ключ шифрования БД)
  yandex_auth: ^1.2.0
  flutter_secure_storage: ^9.2.2

  # защита входа
  local_auth: ^2.3.0

  # бэкап: шифрование и сохранение файла
  crypto: ^3.0.3
  encrypt: ^5.0.3
  url_launcher: ^6.3.0
  file_picker: ^8.0.6
  http: ^1.2.2

  # уведомления
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  lottie: ^3.4.0
  flutter_native_splash: ^2.4.8
  flutter_dynamic_icon_plus: ^1.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
      - assets/noto/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/brand/icon_cream.png"
  adaptive_icon_background: "#FFF8F3"
  adaptive_icon_foreground: "assets/brand/ic_foreground.png"

flutter_native_splash:
  color: "#FFF8F3"
  image: assets/brand/splash_icon.png
  color_dark: "#2D2623"
  image_dark: assets/brand/splash_icon.png
  android_12:
    image: assets/brand/splash_icon.png
    color: "#FFF8F3"
    image_dark: assets/brand/splash_icon.png
    color_dark: "#2D2623"